openapi: 3.1.0
info:
  title: ConsentOps Agent API (read-only)
  version: 0.1.0
  description: |
    Read-only agent surface for the ConsentOps hackathon demo.

    **Synthetic data only** — do not send real personal data.

    **Two-step workflow:** call `POST /api/agent/scan` first, then `POST /api/agent/plan`.
    Demo workflow state must include a scan before plan succeeds.

    Human approval and execution remain in the ConsentOps web UI
    (`POST /api/execute` is intentionally omitted from this spec).

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://consentops-agent-538209538110.us-central1.run.app
    description: Hosted Cloud Run demo

paths:
  /api/agent/scan:
    post:
      operationId: consentOpsScanWarehouse
      summary: Scan synthetic warehouse and Fivetran pipeline context
      description: |
        Runs warehouse scan plus Fivetran MCP discovery trace (when configured).
        Does not generate a cleanup plan or execute deletions.

        Rejects request bodies that include execution fields.
      tags:
        - Agent (read-only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSubjectRequest"
            examples:
              defaultSubject:
                summary: Use demo default subject (Ana Reyes)
                value: {}
      responses:
        "200":
          description: Scan completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentScanResponse"
        "400":
          description: Invalid payload or execution-shaped fields rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agent/plan:
    post:
      operationId: consentOpsBuildPlan
      summary: Generate classified cleanup plan from latest scan
      description: |
        Builds a record-scoped cleanup plan with planner provenance (`gemini` or
        `deterministic`). Requires a prior scan in demo workflow state.

        Rejects request bodies that include execution fields.
      tags:
        - Agent (read-only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSubjectRequest"
            examples:
              defaultSubject:
                summary: Use demo default subject (Ana Reyes)
                value: {}
      responses:
        "200":
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPlanResponse"
        "400":
          description: Invalid payload, missing scan, or execution-shaped fields rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AgentSubjectRequest:
      type: object
      additionalProperties: false
      properties:
        subject:
          $ref: "#/components/schemas/ConsentSubjectPartial"
      description: Optional subject overrides. Omit for the default synthetic demo subject.

    ConsentSubjectPartial:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        customerId:
          type: string
        emailSha256:
          type: string

    AgentScanResponse:
      type: object
      required:
        - capability
        - disclaimer
        - scan
        - summaryForAgent
      properties:
        capability:
          type: string
          enum:
            - scan_only
        disclaimer:
          type: string
        scan:
          $ref: "#/components/schemas/AgentScanSummary"
        summaryForAgent:
          $ref: "#/components/schemas/AgentScanSummaryForAgent"

    AgentPlanResponse:
      type: object
      required:
        - capability
        - disclaimer
        - plan
        - source
        - blockedActions
        - summaryForAgent
      properties:
        capability:
          type: string
          enum:
            - plan_only
        disclaimer:
          type: string
        plan:
          $ref: "#/components/schemas/CleanupPlan"
        source:
          type: string
          enum:
            - gemini
            - deterministic
        warning:
          type: string
          nullable: true
        blockedActions:
          type: array
          items:
            type: string
        summaryForAgent:
          $ref: "#/components/schemas/AgentPlanSummaryForAgent"

    AgentScanSummaryForAgent:
      type: object
      properties:
        recordsFound:
          type: integer
        spreadByTable:
          type: object
          additionalProperties:
            type: integer
        instruction:
          type: string

    AgentPlanSummaryForAgent:
      type: object
      properties:
        recordsFound:
          type: integer
        actionsByClassification:
          type: object
          additionalProperties:
            type: integer
        plannerSource:
          type: string
        instruction:
          type: string

    AgentScanSummary:
      type: object
      required:
        - subject
        - fivetran
        - beforeCount
        - spreadMap
        - matchCount
      properties:
        subject:
          $ref: "#/components/schemas/ConsentSubject"
        fivetran:
          $ref: "#/components/schemas/FivetranPanelData"
        beforeCount:
          type: integer
          minimum: 0
        matchCount:
          type: integer
          minimum: 0
        spreadMap:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DataSpreadMapEntry"
        scanSource:
          type: string
        mcpTrace:
          type: array
          items:
            type: object
        pipelineLineage:
          type: array
          items:
            type: object

    ConsentSubject:
      type: object
      required:
        - id
        - fullName
        - email
        - phone
        - customerId
        - emailSha256
      properties:
        id:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        customerId:
          type: string
        emailSha256:
          type: string

    FivetranPanelData:
      type: object
      properties:
        mode:
          type: string
          enum:
            - mock
            - live_read_only
            - mcp_runtime
        modeLabel:
          type: string
        connectionCount:
          type: integer
        connectors:
          type: array
          items:
            type: object

    DataSpreadMapEntry:
      type: object
      properties:
        totalMatches:
          type: integer

    CleanupPlan:
      type: object
      required:
        - id
        - subjectId
        - createdAtIso
        - totalMatchesBeforeCleanup
        - actions
      properties:
        id:
          type: string
        subjectId:
          type: string
        createdAtIso:
          type: string
          format: date-time
        totalMatchesBeforeCleanup:
          type: integer
        actions:
          type: array
          items:
            $ref: "#/components/schemas/CleanupAction"

    CleanupAction:
      type: object
      required:
        - id
        - table
        - recordIds
        - classification
        - fields
      properties:
        id:
          type: string
        table:
          type: string
        recordIds:
          type: array
          items:
            type: string
          minItems: 1
        classification:
          type: string
          enum:
            - delete
            - anonymize
            - retain
            - review
        fields:
          type: array
          items:
            type: string
        retainReason:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: array

tags:
  - name: Agent (read-only)
    description: Scan and plan only — no destructive operations
